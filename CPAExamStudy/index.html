<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jets CPA Game | ISC Mastery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="app-header">
    <div class="brand">
        <span class="logo">ISC</span> Mastery 🏈
    </div>

    <div class="user-stats">
        <div class="stat-item">
            Streak: <span id="streak-count">0</span> 🔥
        </div>
        <div class="stat-item">
            XP: <span id="xp-count">0</span>
        </div>
        <div class="stat-item">
            <span id="user-rank" class="rank-badge">Rookie</span>
        </div>
    </div>
</header>

<!-- XP BAR -->
<div class="xp-wrap">
    <div class="xp-top">
        <span id="level-text">Level 1</span>
        <span>XP Progress</span>
    </div>
    <div class="xp-bar">
        <div id="xp-bar-fill"></div>
    </div>
</div>

<main id="app-container">

<!-- DASHBOARD -->
<section id="dashboard-screen" class="screen">

<div class="welcome-card">
    <h1>Jets CPA Training Camp</h1>
    <p>Train like a pro. Dominate ISC.</p>
</div>

<div class="mastery-grid">
    <div class="mastery-card">
        <h3>Area I</h3>
        <div class="progress-bar"><div class="fill"></div></div>
        <small>Info Systems</small>
    </div>

    <div class="mastery-card">
        <h3>Area II</h3>
        <div class="progress-bar"><div class="fill"></div></div>
        <small>Security</small>
    </div>

    <div class="mastery-card">
        <h3>Area III</h3>
        <div class="progress-bar"><div class="fill"></div></div>
        <small>SOC</small>
    </div>
</div>

<div class="action-zone">
    <button id="start-quiz-btn" class="btn-primary">Start Game 🎮</button>
    <button id="review-missed-btn" class="btn-secondary">Review Weaknesses</button>
</div>

</section>

<!-- QUIZ -->
<section id="quiz-screen" class="screen hidden">

<div class="quiz-header">
    <span id="question-meta">Area</span>
    <span id="progress-text">1/10</span>
</div>

<h2 id="question-text">Question here</h2>

<div id="options-list" class="options-grid"></div>

<div id="feedback-container" class="hidden">
    <div id="feedback-message"></div>
    <p id="explanation-text"></p>
    <button id="next-btn" class="btn-primary">Next ▶</button>
</div>

<div class="quiz-footer">
    <button id="flag-btn" class="btn-outline">Flag 🚩</button>
</div>

</section>

<!-- RESULTS -->
<section id="results-screen" class="screen hidden">

<h2>Game Complete 🏆</h2>

<div class="score-display">
    <span id="final-score">0%</span>
</div>

<div id="xp-gained-msg"></div>

<button onclick="location.reload()" class="btn-primary">
    Play Again 🔄
</button>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
